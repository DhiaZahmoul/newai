<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .card.featured {
            border: 2px solid #007bff;
            transform: scale(1.05);
        }

        .card.featured::before {
            content: "Most Popular";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            margin-top: 20px;
        }

        .card.featured .card-title {
            margin-top: 30px;
        }

        .card-price {
            font-size: 36px;
            font-weight: 800;
            color: #27ae60;
            margin-bottom: 8px;
        }

        .card-price-period {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .card-features {
            list-style: none;
            margin-bottom: 30px;
            text-align: left;
        }

        .card-features li {
            padding: 12px 0;
            border-bottom: 1px solid #ecf0f1;
            color: #34495e;
            position: relative;
            padding-left: 25px;
        }

        .card-features li:last-child {
            border-bottom: none;
        }

        .card-features li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #27ae60;
            font-weight: bold;
        }

        .card-button {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-button:hover {
            background: linear-gradient(135deg, #0056b3, #004085);
            transform: translateY(-2px);
        }

        .card-button:active {
            transform: translateY(0);
        }

        .page-title {
            text-align: center;
            font-size: 42px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .page-subtitle {
            text-align: center;
            font-size: 18px;
            color: #7f8c8d;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .card.featured {
                transform: none;
            }
            
            .page-title {
                font-size: 32px;
            }
            
            body {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">Choose Your Plan</h1>
        <p class="page-subtitle">Select the perfect plan for your needs. All plans include our core features with varying levels of storage and support.</p>
        
        <div class="cards-grid" id="cards-container">
            <!-- Cards will be generated by JavaScript -->
        </div>
    </div>

    <script>
        // Reusable Card Component
        class Card {
            constructor(title, price, period, features, buttonText = "Start Trial", featured = false) {
                this.title = title;
                this.price = price;
                this.period = period;
                this.features = features;
                this.buttonText = buttonText;
                this.featured = featured;
            }

            render() {
                const featuresHTML = this.features.map(feature => `<li>${feature}</li>`).join('');
                
                return `
                    <div class="card ${this.featured ? 'featured' : ''}">
                        <h2 class="card-title">${this.title}</h2>
                        <div class="card-price">$${this.price}</div>
                        <div class="card-price-period">/${this.period}</div>
                        <ul class="card-features">
                            ${featuresHTML}
                        </ul>
                        <button class="card-button" onclick="handleCardClick('${this.title}')">${this.buttonText}</button>
                    </div>
                `;
            }
        }

        // Card data
        const cardData = [
            new Card("Basic", "9.99", "month", [
                "1 GB Storage",
                "Basic Email Support",
                "All Core Features",
                "Mobile App Access"
            ]),
            new Card("Professional", "19.99", "month", [
                "10 GB Storage",
                "Priority Support",
                "All Core Features",
                "Advanced Analytics",
                "API Access",
                "Custom Integrations"
            ], "Start Free Trial", true),
            new Card("Enterprise", "49.99", "month", [
                "Unlimited Storage",
                "24/7 Phone Support",
                "All Core Features",
                "Advanced Analytics",
                "API Access",
                "Custom Integrations",
                "Dedicated Account Manager",
                "SLA Guarantee"
            ], "Contact Sales")
        ];

        // Render cards
        function renderCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = cardData.map(card => card.render()).join('');
        }

        // Handle card button clicks
        function handleCardClick(planName) {
            alert(`You selected the ${planName} plan! Redirecting to checkout...`);
            // In a real application, you would redirect to a checkout page or handle the selection
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', renderCards);
    </script>
</body>
</html>
